\* TLC Model Configuration — Guardian.tla
\*
\* Usage:
\*
\*   tlc Guardian.tla -config Guardian.cfg
\*
\* or via the TLA+ Toolbox / VS Code extension.
\*
\* ─── Bug 1 check ────────────────────────────────────────────────────────────
\* Run with SPECIFICATION Spec (below).
\* Expected: NoSpuriousCandidates FAILS with a ~9-step counterexample trace.
\* Change to SPECIFICATION SpecIntended to confirm all invariants pass.
\*
\* ─── Liveness check ─────────────────────────────────────────────────────────
\* Uncomment FairSpecIntended below and PROPERTY EventualRestartAfterRecovery.
\* Expected: property PASSES (every eligible recovery eventually restarts pods).

CONSTANTS
    LvolIDs    = {L1, L2}
    PodUIDs    = {P1, P2}
    ClusterIDs = {C1}
    MinBrokenFor   = 2
    RestartBackoff = 3
    MaxClock       = 10

\* ─── Toggle between buggy and intended behaviour ─────────────────────────

SPECIFICATION Spec

\* To check the intended / fixed implementation, comment out Spec above
\* and uncomment one of the lines below:
\* SPECIFICATION SpecIntended
\* SPECIFICATION FairSpecIntended

\* ─── Safety invariants ───────────────────────────────────────────────────

INVARIANTS
    TypeOK
    NoRestartOnInactiveCluster
    MinBrokenForRespected
    NoSpuriousCandidates

\* ─── Liveness (comment in to check with FairSpecIntended) ─────────────────

\* PROPERTY EventualRestartAfterRecovery
