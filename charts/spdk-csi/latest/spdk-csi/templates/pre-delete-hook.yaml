{{- if .Values.operator.enabled }}
---
# Pre-delete hook: strips finalizers from all simplyblock CRs so that
# helm uninstall does not leave resources stuck in Terminating.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: simplyblock-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: simplyblock-cleanup-role
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
rules:
- apiGroups:
  - storage.simplyblock.io
  resources:
  - storageclusters
  - storagenodes
  - pools
  - lvols
  - devices
  - tasks
  - snapshotreplications
  - storagebackups
  verbs:
  - get
  - list
  - patch
  - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: simplyblock-cleanup-rolebinding
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: simplyblock-cleanup-role
subjects:
- kind: ServiceAccount
  name: simplyblock-cleanup
  namespace: {{ .Release.Namespace }}

---
apiVersion: batch/v1
kind: Job
metadata:
  name: simplyblock-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: simplyblock-cleanup
      restartPolicy: OnFailure
      containers:
      - name: cleanup
        image: quay.io/simplyblock-io/kubectl:1.34.1
        command:
        - /bin/sh
        - -c
        - |
          NS="{{ .Release.Namespace }}"
          RESOURCES="storageclusters storagenodes pools lvols devices tasks snapshotreplications storagebackups"
          for resource in $RESOURCES; do
            for name in $(kubectl get "$resource" -n "$NS" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo "Removing finalizers from $resource/$name"
              kubectl patch "$resource" "$name" -n "$NS" \
                --type=merge -p '{"metadata":{"finalizers":[]}}' 2>/dev/null || true
            done
          done
          echo "Finalizer cleanup complete"
{{- end }}
